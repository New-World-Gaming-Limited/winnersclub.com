<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0d10"/>
      <stop offset="0.55" stop-color="#8b0a1a"/>
      <stop offset="1" stop-color="#5a060f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="10" x2="0" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE680"/>
      <stop offset="0.5" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.55"/>
  <!-- W + C monogram, serif feel -->
  <g fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="22" y="44" font-size="36" letter-spacing="-2">W</text>
    <text x="44" y="44" font-size="36" letter-spacing="-2">C</text>
  </g>
</svg>
